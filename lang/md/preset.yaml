---
repos:
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.20
    hooks:
      - id: rumdl-fmt
  - repo: https://github.com/thlorenz/doctoc
    rev: v2.2.1
    hooks:
      - id: doctoc
  - repo: https://github.com/amperser/proselint
    rev: 0.14.0
    hooks:
      - id: proselint
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
