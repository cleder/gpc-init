---
repos:
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: cargo-check
        args:
          - --workspace
      - id: clippy
        args:
          - --
          - -D
          - warnings
      - id: fmt
        args:
          - --
          - --check
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
