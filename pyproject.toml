[dependency-groups]
dev = [
    "deptry>=0.24.0",
    "pre-commit>=4.2.0",
    "typer>=0.12.0",
    { include-group = "lint" },
    { include-group = "test" },
]
lint = [
    "complexipy",
    "pyrefly>=1.1.1",    
    "ruff",
    "rumdl>=0.0.129",
]
test = [
    "coverage[toml]",
    "pytest",
    "pytest-cov",
]
[project]
name = "gpc-init"
version = "0.1.0"
description = "Generate .pre-commit-config.yaml from language and framework presets"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pyyaml>=6.0",
    "typer>=0.26.7",
]

[project.scripts]
pc-init = "gpc_init.cli:entry_point"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.pyrefly]
project_excludes = ["tests/**", "specs/**"]
