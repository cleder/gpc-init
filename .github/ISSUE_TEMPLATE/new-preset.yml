name: New or Updated Preset
description: Propose adding or updating a language/framework preset
title: "[Preset] "
labels: ["preset"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing a preset! Before submitting, please confirm you have validated and updated the preset file.

  - type: input
    id: preset-path
    attributes:
      label: Preset file path
      description: Path to the preset file (e.g. `lang/py/preset.yaml` or `framework/django/preset.yaml`)
      placeholder: lang/xx/preset.yaml
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What does this preset add or change?
      description: Briefly describe the hooks added, updated, or removed and why.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      description: |
        Run the following commands against your preset file and confirm each passes before opening this issue.
      options:
        - label: >
            `pre-commit validate-config <preset-file>` passes without errors
          required: true
        - label: >
            `prek validate-config <preset-file>` passes without errors
          required: true
        - label: >
            `pre-commit autoupdate -c <preset-file>` was run and hook revisions are up to date
          required: true
        - label: >
            `prek autoupdate -c <preset-file>` was run and hook revisions are up to date
          required: true
        - label: All hooks listed in the preset are publicly available and actively maintained
          required: true
