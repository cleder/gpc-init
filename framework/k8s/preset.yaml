---
repos:
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.3.1
    hooks:
      - id: checkov_diff
        files: \.ya?ml$
        args: [--framework, kubernetes]
  - repo: https://github.com/stackrox/kube-linter
    rev: v0.8.3
    hooks:
      - id: kube-linter
  - repo: https://github.com/yannh/kubeconform
    rev: v0.6.7
    hooks:
      - id: kubeconform
        args:
          - --strict
          - --ignore-missing-schemas
