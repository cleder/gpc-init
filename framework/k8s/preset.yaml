---
repos:
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.3.2
    hooks:
      - id: checkov_diff
        files: \.ya?ml$
        args: [--framework, kubernetes]
  - repo: https://github.com/stackrox/kube-linter
    rev: v0.8.3
    hooks:
      - id: kube-linter
  - repo: https://github.com/jtyr/kubeconform-helm
    rev: v0.3.0
    hooks:
      - id: kubeconform-helm
